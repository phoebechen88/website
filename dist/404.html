<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        var repoBase = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
        var appPath = l.pathname.slice(repoBase.length).replace(/^\/+/, '');

        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            repoBase +
            '/?p=' +
            encodeURIComponent(appPath) +
            (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
